<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Wrapped — Your year in AI</title>
    <meta name="description" content="Turn your AI chat exports into a beautiful year-in-review. Everything parsed in your browser — zero uploads." />
  </head>
  <body>
    <!-- Grain SVG filter — inline so no network call needed -->
    <svg width="0" height="0" style="position:absolute">
      <defs>
        <filter id="aw-grain-filter" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="sRGB">
          <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
          <feColorMatrix type="saturate" values="0" in="noise" result="grey"/>
          <feBlend in="SourceGraphic" in2="grey" mode="multiply"/>
        </filter>
      </defs>
    </svg>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
